name: chipolo_monitor_app
description: Chipolo POP BLE Presence Monitor
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.35.3
  provider: ^6.1.2
  intl: ^0.19.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.0
  shared_preferences: ^2.3.0
  mailer: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21
flutter:
  uses-material-design: true
